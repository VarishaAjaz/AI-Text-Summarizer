<div class="min-h-screen bg-gray-950 text-white flex flex-col items-center justify-start px-4 py-16">

  <!-- Header -->
  <div class="text-center mb-12">
    <span class="text-xs font-mono tracking-widest text-violet-400 uppercase mb-3 block">Powered by Groq · LLaMA 3.3</span>
    <h1 class="text-5xl font-bold tracking-tight mb-3">AI Text Summarizer</h1>
    <p class="text-gray-400 text-lg">Paste any text. Get a sharp summary in seconds.</p>
  </div>

  <!-- Card -->
  <div class="w-full max-w-2xl bg-gray-900 rounded-2xl border border-gray-800 p-8 shadow-2xl">

    <!-- Input -->
    <label class="block text-sm font-medium text-gray-400 mb-2">Your Text</label>
    <textarea
      [(ngModel)]="inputText"
      placeholder="Paste an article, paragraph, or any text here..."
      rows="7"
      class="w-full bg-gray-800 text-white placeholder-gray-600 rounded-xl border border-gray-700 p-4 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-violet-500 transition">
    </textarea>

    <!-- Button -->
    <button
      (click)="summarize()"
      [disabled]="loading"
      class="mt-4 w-full py-3 rounded-xl font-semibold text-sm tracking-wide transition-all
             bg-violet-600 hover:bg-violet-500 disabled:opacity-50 disabled:cursor-not-allowed">
      {{ loading ? 'Summarizing...' : 'Summarize' }}
    </button>

    <!-- Loading -->
    <div *ngIf="loading" class="mt-6 flex items-center gap-3 text-violet-400 text-sm">
      <svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
      </svg>
      Thinking...
    </div>

    <!-- Result -->
    <div *ngIf="result && !loading" class="mt-6">
      <div class="flex items-center justify-between mb-3">
        <span class="text-xs font-mono text-violet-400 uppercase tracking-widest">Summary</span>
        <button (click)="copyResult()" class="text-xs text-gray-500 hover:text-white transition">
          {{ copied ? '✓ Copied' : 'Copy' }}
        </button>
      </div>
      <div class="bg-gray-800 border border-gray-700 rounded-xl p-5 text-sm text-gray-200 leading-relaxed whitespace-pre-wrap">
        {{ result }}
      </div>
    </div>

  </div>

  <!-- Footer -->
  <p class="mt-10 text-xs text-gray-600">Built with Angular · Node.js · Groq API</p>

</div>
